<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: transparent; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        #ticker-box {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%) translateY(200px); /* Start off-screen */
            background: linear-gradient(90deg, #1b191989, rgba(20, 20, 20, 0.9));
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 28px;
            font-weight: 800;
            white-space: nowrap;
            box-shadow: 0 10px 20px #8b0b0b89;
            border: 3px solid #020202;
            transition: transform 1s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        #ticker-box.show {
            transform: translateX(-50%) translateY(0); /* Slide up into view */
        }

        .label { color: #ffffff; margin-right: 15px; text-transform: uppercase; font-size: 18px; vertical-align: middle; }
    </style>
</head>
<body>
    <div id="ticker-box">
        <span class="label">TalkToText:ON</span>
        <span id="goal-text">Waiting for stream to start...</span>
    </div>

    <script>
        const ticker = document.getElementById('ticker-box');
        const goalDisplay = document.getElementById('goal-text');
        const ws = new WebSocket('ws://localhost:8080');

        // Logic for the 3-minute timer
        function startLoop() {
            setInterval(() => {
                ticker.classList.add('show'); // Slide Up
                
                setTimeout(() => {
                    ticker.classList.remove('show'); // Slide Down after 15 seconds
                }, 30000); 

            }, 100000); // 100,000ms = 1 minute
        }

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            // Listen for a special "UPDATE_GOAL" message from our chat listener
            if (data.type === 'UPDATE_GOAL') {
                goalDisplay.innerText = data.text;
                // Flash it briefly so you know it updated
                ticker.classList.add('show');
                setTimeout(() => ticker.classList.remove('show'), 3000);
            }
        };

        startLoop();
    </script>
</body>
</html>

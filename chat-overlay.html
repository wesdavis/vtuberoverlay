<!DOCTYPE html>
<html>
<head>
    <title>Twitch Chat & Swaying Frog Overlay</title>
    <style>
        body { 
            background: transparent; 
            font-family: 'Segoe UI', sans-serif; 
            overflow: hidden; 
            margin: 0;
            padding: 0;
        }

        #chat-container { 
            display: flex; 
            flex-direction: row; 
            align-items: flex-start; 
            height: 100vh; 
            width: 1000px; 
            
            /* THE FIX: The Buffer Zone */
            /* This pushes the frog down and to the right, away from the OBS walls */
            padding-top: 80px; 
            padding-left: 80px; 
            
            animation: sway 5s ease-in-out infinite; 
            transform-origin: top center; 
        }

        #frog-head {
            width: 250px;
            height: auto;
            
            /* THE FIX: Frog Specific Positioning */
            /* Increase these numbers if he is still hitting the edges */
            margin-top: 20px; 
            margin-left: 20px; 
            margin-right: 30px; 
            
            flex-shrink: 0; 
            filter: drop-shadow(4px 4px 8px rgba(0,0,0,0.7));
        }

        .message-list {
            display: flex;
            flex-direction: column-reverse; 
            width: 100%;
            margin-top: 50px; 
        }

        .message { 
            background: rgba(20, 20, 20, 0.85); 
            color: white; 
            padding: 18px 25px; 
            margin: 10px 0; 
            border-radius: 15px; 
            animation: slideIn 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); 
            max-width: 500px;
            border-left: 5px solid #4ecdc4;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
        }

        .username { font-size: 28px; font-weight: 900; margin-bottom: 8px; color: #4ecdc4; }
        .text { font-size: 24px; line-height: 1.4; font-weight: 500; }

        @keyframes slideIn { 
            from { opacity: 0; transform: translateX(-30px) scale(0.8); } 
            to { opacity: 1; transform: translateX(0) scale(1); } 
        }

        @keyframes sway {
            0%   { transform: rotate(0deg); }
            25%  { transform: rotate(1.5deg); }
            50%  { transform: rotate(0deg); }
            75%  { transform: rotate(-1.5deg); }
            100% { transform: rotate(0deg); }
        }
    </style>
</head>
<body>
    <div id="chat-container">
        <!-- Make sure your asset name matches your folder exactly -->
        <img id="frog-head" src="assets/frog-head.png" alt="Swaying Frog Head">

        <div id="message-list" class="message-list"></div>
    </div>

    <script>
        const messageListContainer = document.getElementById('message-list');
        const ws = new WebSocket('ws://localhost:8080');

        // --- TTS Logic Variables ---
        let speechQueue = [];
        let isSpeaking = false;
        

        // This function handles the actual "Talk"
        function speakNext() {
            // If we are already talking or the queue is empty, exit
            if (isSpeaking || speechQueue.length === 0) return;

            isSpeaking = true;
            const messageToSay = speechQueue.shift(); 

            // Pick your voice! "Brian" is the classic British Twitch voice. 
            // Others include: "Justin" (US Male), "Salli" (US Female), "Amy" (British Female)
            const voice = "Brian"; 
            
            // Encode the text so URLs can read spaces and symbols safely
            const safeText = encodeURIComponent(messageToSay);
            const apiUrl = `https://api.streamelements.com/kappa/v2/speech?voice=${voice}&text=${safeText}`;

            // Create an audio player for the MP3 StreamElements gives us
            const audio = new Audio(apiUrl);
            audio.volume = 1.0;

            // When the audio finishes playing, trigger the next one
            audio.onended = () => {
                isSpeaking = false;
                speakNext();
            };

            // If there's an error (like a bad network connection), skip and keep going
            audio.onerror = (err) => {
                console.error("StreamElements audio failed to load.", err);
                isSpeaking = false;
                speakNext();
            };

            // Play the audio! (Still requires the "Interact" click in OBS first)
            audio.play().catch(err => {
                console.error("Browser blocked audio. Make sure to click 'Interact' in OBS!", err);
                isSpeaking = false;
                speakNext();
            });
        }

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            if (data.type === 'CHAT_MSG') {
                
                // 1. Create the Visual Bubble
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message';
                msgDiv.innerHTML = `
                    <div class="username" style="color: ${data.color}">${data.user}</div>
                    <div class="text">${data.text}</div>
                `;
                
                messageListContainer.prepend(msgDiv); 

                // 2. Add to Speech Queue
                const cleanText = data.text.replace(/[^\w\s]/gi, '');
                speechQueue.push(`${data.user} says: ${cleanText}`);

                // 3. Trigger the Speech Engine
                speakNext();

                // Auto-remove the bubble after 10 seconds
                setTimeout(() => msgDiv.remove(), 10000);
            }
        };
    </script>
</body>
</html>
